  <script>

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig); //Подключиться к firebase(проекту)
  // const app = initializeApp(firebaseConfig);
  // const analytics = getAnalytics(app);
  async function register(email, password)
  {
    try
    {
      await firebase.auth().createUserWithEmailAndPassword(email, password);
      return "OK";
    }
    catch(e)
    {
      return e.message;
    }
  }
  async function login(email, password)
  {
    try
    {
      await firebase.auth().signInWithEmailAndPassword(email, password);
      return "OK";
    }
    catch(e)
    {
      return e.message;
    }
  }
  function logout()
  {
    return firebase.auth().signOut();
  }
  function getUser()
  {
    return firebase.auth().currentUser.email
  }
  async function getFullProfile() {
  const user = firebase.auth().currentUser;
  if (!user) return null;

  const doc = await firebase.firestore()
    .collection("users")
    .doc(user.uid)
    .get();

  return {
    name: user.displayName,
    avatar: user.photoURL,
    email: user.email,
    desc: doc.exists ? doc.data().desc : ""
  };
}
async function saveProfile(name, avatar, desc) {
  try {
    const user = firebase.auth().currentUser;

    // обновляем auth (имя + фото)
    await user.updateProfile({
      displayName: name,
      photoURL: avatar
    });

    // сохраняем bio в Firestore
    await firebase.firestore()
      .collection("users")
      .doc(user.uid)
      .set({
        desc: desc
      }, { merge: true });

    return "OK";
  } catch (e) {
    return e.message;
  }
}
